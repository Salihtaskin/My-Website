<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Login // Salih Taşkın</title>
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<canvas id="matrix-canvas"></canvas>

<nav class="navbar">
  <div class="nav-inner">
    <a href="index.html" class="logo">S.T <span>// CyberSec</span></a>
    <div class="nav-actions">
      <div class="lang-toggle">
        <button data-lang="tr">TR</button>
        <button data-lang="en">EN</button>
      </div>
    </div>
  </div>
</nav>

<div class="login-wrap">
  <div class="login-box">
    <div class="top"><span class="dot red"></span><span class="dot yellow"></span><span class="dot green"></span></div>
    <h2 data-i18n="login.title">Güvenli Erişim</h2>
    <div class="sub" data-i18n="login.sub">Devam etmek için kimlik bilgilerinizi girin</div>

    <form id="login-form">
      <div class="field">
        <label data-i18n="login.email_label">E-posta</label>
        <input type="email" id="email" autocomplete="email" required>
      </div>
      <div class="field">
        <label data-i18n="login.pass_label">Şifre</label>
        <input type="password" id="password" autocomplete="current-password" required>
      </div>
      <div class="login-msg" id="login-msg"></div>
      <button type="submit" class="btn" id="login-submit" style="width:100%;justify-content:center;" data-i18n="login.btn">Giriş Yap</button>
    </form>

    <div class="login-hint">
      <span data-i18n="login.no_account">Hesabın yok mu?</span>
      <a href="register.html" style="color:var(--neon);" data-i18n="login.register_link">Kayıt ol</a>
    </div>
    <a href="index.html" class="back-link" data-i18n="login.back">← Ana sayfaya dön</a>
  </div>
</div>

<script src="js/translations.js"></script>
<script src="js/main.js"></script>
<script src="js/login.js"></script>
</body>
</html>
